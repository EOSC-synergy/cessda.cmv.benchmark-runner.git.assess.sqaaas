        - /usr/bin/env sh .sqa/script.magenta_inventive_octopus.sh
        container: qc.met_mango_melancholy_squirrel
  QC.Sty:
    repos:
      github.com/cessda/cessda.cmv.benchmark-runner checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.nutmeg_easygoing_tiger.sh
        container: qc.sty_carmine_innocent_buffalo
      github.com/cessda/cessda.cmv.benchmark-runner hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.poppy_peaceful_penguin.sh
        container: qc.sty_umber_imaginative_kiwi
      github.com/cessda/cessda.cmv.benchmark-runner jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.lime_tactful_spren.sh
        container: qc.sty_pine_savvy_anaconda
